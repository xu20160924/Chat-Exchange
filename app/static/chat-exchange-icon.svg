<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients for message boxes matching website colors -->
    <linearGradient id="chatGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d6efd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0b5ed7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="exchangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5ac8fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d6efd;stop-opacity:1" />
    </linearGradient>
    <!-- Shadow filter -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background with subtle gradient -->
  <rect width="512" height="512" fill="#ffffff"/>
  
  <!-- Left message bubble (orange) with shadow -->
  <g filter="url(#shadow)">
    <rect x="100" y="180" width="180" height="140" rx="25" ry="25" fill="url(#chatGradient)"/>
    <!-- Speech bubble tail -->
    <path d="M 120 320 L 100 360 L 150 330 Z" fill="url(#chatGradient)"/>
    
    <!-- Message lines inside bubble -->
    <line x1="140" y1="220" x2="240" y2="220" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
    <line x1="140" y1="250" x2="240" y2="250" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
    <line x1="140" y1="280" x2="210" y2="280" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
  </g>
  
  <!-- Right message bubble (purple gradient) with shadow -->
  <g filter="url(#shadow)">
    <rect x="232" y="210" width="180" height="140" rx="25" ry="25" fill="url(#exchangeGradient)"/>
    <!-- Speech bubble tail -->
    <path d="M 392 350 L 412 390 L 362 360 Z" fill="url(#exchangeGradient)"/>
    
    <!-- Message lines inside bubble -->
    <line x1="272" y1="250" x2="372" y2="250" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
    <line x1="272" y1="280" x2="372" y2="280" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
    <line x1="272" y1="310" x2="342" y2="310" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
  </g>
  
</svg>
